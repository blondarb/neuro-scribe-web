name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: scribe

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scribe/package-lock.json
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scribe/package-lock.json
      - run: npm ci
      - run: npm run test:coverage
      - name: Check coverage thresholds
        run: |
          # Enforce minimum coverage: 80% for services, 60% overall
          # vitest --coverage outputs a text summary; parse the "All files" line
          COVERAGE_OUTPUT=$(npm run test:coverage -- --reporter=text 2>&1 || true)
          ALL_LINE=$(echo "$COVERAGE_OUTPUT" | grep "All files" | head -1)
          if [ -n "$ALL_LINE" ]; then
            # Extract the first percentage (statements coverage)
            STMT_PCT=$(echo "$ALL_LINE" | awk '{print $4}' | tr -d '%')
            echo "Statement coverage: ${STMT_PCT}%"
            THRESHOLD=60
            if [ "$(echo "$STMT_PCT < $THRESHOLD" | bc -l)" = "1" ]; then
              echo "::error::Coverage ${STMT_PCT}% is below threshold ${THRESHOLD}%"
              exit 1
            fi
            echo "Coverage ${STMT_PCT}% meets threshold ${THRESHOLD}%"
          else
            echo "::warning::Could not parse coverage output — skipping threshold check"
          fi

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scribe/package-lock.json
      - run: npm ci
      - name: Dependency audit
        run: npm audit --audit-level=high
      - name: PHI leak scan
        run: bash scripts/phi-scan.sh
