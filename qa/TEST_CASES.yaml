- id: PF-06
  category: performance
  milestone: M4
  title: Concurrent user handling
  priority: P2
  steps:
    - Simulate 10 concurrent users processing encounters
    - Monitor API response times and error rates
  expected:
    - No degradation with 10 concurrent users
    - API response times within 2x of single-user baseline
    - Zero errors due to concurrency
